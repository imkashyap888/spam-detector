<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpamShield — Email Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:       #ffffff;
      --off:         #fafaf9;
      --bg:          #f4f3f0;
      --border:      #e5e4e0;
      --border-md:   #d4d2cc;
      --text:        #1a1915;
      --muted:       #6b6a64;
      --faint:       #9c9b95;
      --accent:      #e63329;
      --accent-bg:   #fef2f1;
      --accent-dark: #b5241b;
      --green:       #16a34a;
      --green-bg:    #f0fdf4;
      --green-dark:  #15803d;
      --font:        'DM Sans', sans-serif;
      --mono:        'DM Mono', monospace;
      --ease:        cubic-bezier(0.22,1,0.36,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: start center;
      padding: 48px 20px 80px;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Nav */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-icon {
      width: 34px; height: 34px;
      background: var(--text);
      border-radius: 9px;
      display: grid;
      place-items: center;
    }
    .nav-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .nav-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--green);
      background: var(--green-bg);
      border: 1px solid #bbf7d0;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* Hero */
    .hero { margin-bottom: 8px; }
    .hero h1 {
      font-size: clamp(1.75rem, 4vw, 2.4rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--text);
    }
    .hero h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--muted);
    }
    .hero p {
      margin-top: 10px;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 480px;
    }

    /* Card */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .card-body { padding: 24px; }

    /* Field */
    .field-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .field-label span {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .word-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--faint);
    }

    textarea {
      width: 100%;
      min-height: 148px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 15px;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--off);
      line-height: 1.65;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }
    textarea::placeholder { color: var(--faint); }
    textarea:focus {
      border-color: var(--border-md);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }

    /* Chips */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      padding: 5px 11px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--off);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: var(--font);
    }
    .chip:hover {
      border-color: var(--border-md);
      background: var(--white);
      color: var(--text);
    }
    .chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chip-dot.red   { background: var(--accent); }
    .chip-dot.green { background: var(--green); }

    /* Divider */
    .divider { height: 1px; background: var(--border); }

    /* Footer */
    .card-footer {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--off);
      gap: 12px;
    }
    .footer-hint {
      font-size: 12px;
      color: var(--faint);
      font-family: var(--mono);
    }
    kbd {
      display: inline-block;
      background: var(--white);
      border: 1px solid var(--border-md);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .btn-row { display: flex; gap: 8px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 9px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: -0.01em;
    }
    .btn-primary { background: var(--text); color: var(--white); }
    .btn-primary:hover  { background: #2f2e29; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: var(--border-md); color: var(--faint); cursor: not-allowed; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--white); border-color: var(--border-md); color: var(--text); }

    .spin {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: rot 0.65s linear infinite;
    }
    @keyframes rot { to { transform: rotate(360deg); } }

    /* Result */
    #result-card { display: none; opacity: 0; transform: translateY(8px); transition: opacity 0.35s var(--ease), transform 0.35s var(--ease); }
    #result-card.show { display: block; opacity: 1; transform: translateY(0); }

    .result-header {
      padding: 22px 24px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .verdict-wrap { display: flex; align-items: center; gap: 12px; }
    .verdict-icon {
      width: 42px; height: 42px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .verdict-icon.spam { background: var(--accent-bg); }
    .verdict-icon.ham  { background: var(--green-bg); }
    .verdict-label {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }
    .verdict-label.spam { color: var(--accent-dark); }
    .verdict-label.ham  { color: var(--green-dark); }
    .verdict-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .conf-badge {
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: 500;
      white-space: nowrap;
    }
    .conf-badge.spam { background: var(--accent-bg); color: var(--accent); border: 1px solid #fca5a5; }
    .conf-badge.ham  { background: var(--green-bg); color: var(--green); border: 1px solid #86efac; }

    .prob-section { padding: 20px 24px 24px; }
    .prob-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--faint);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }
    .bar-item { margin-bottom: 12px; }
    .bar-item:last-child { margin-bottom: 0; }
    .bar-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .bar-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .bar-pct  { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .bar-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; width: 0%; transition: width 1s var(--ease); }
    .bar-fill.spam { background: var(--accent); }
    .bar-fill.ham  { background: var(--green); }

    /* Error */
    .error-box {
      display: none;
      align-items: flex-start;
      gap: 10px;
      background: var(--accent-bg);
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13.5px;
      color: var(--accent-dark);
      line-height: 1.5;
    }
    .error-box.show { display: flex; }

    /* Page footer */
    .page-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--faint);
    }
    .page-footer span { color: var(--border-md); }

    @media (max-width: 480px) {
      body { padding: 28px 14px 60px; }
      .card-footer { flex-direction: column; align-items: flex-start; }
      .footer-hint { order: 2; }
      .btn-row { order: 1; width: 100%; }
      .btn { flex: 1; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="page">

  <nav class="nav">
    <div class="nav-brand">
      <div class="nav-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="3" width="14" height="11" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
          <path d="M2 6l7 5 7-5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M6 10.5L3 13M12 10.5l3 2.5" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
        </svg>
      </div>
      <span class="nav-name">SpamShield</span>
    </div>
    <div class="nav-badge">
      <div class="live-dot"></div>
      Live
    </div>
  </nav>

  <div class="hero">
    <h1>Detect spam,<br/><em>instantly.</em></h1>
    <p>Paste any email or message below. Our Naive Bayes model will classify it in milliseconds.</p>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="field-label">
        <span>Message content</span>
        <span class="word-count" id="word-count">0 words</span>
      </div>
      <textarea id="input" placeholder="Paste your email or message here…" oninput="onInput()"></textarea>
      <div class="chips">
        <button class="chip" onclick="load('Congratulations! You have been selected as a prize winner. Click the link below to claim your $500 gift card. This offer expires in 24 hours. Act now!')">
          <span class="chip-dot red"></span>Promo spam
        </button>
        <button class="chip" onclick="load('URGENT: Your account will be suspended. Verify your details immediately at this link to avoid permanent closure.')">
          <span class="chip-dot red"></span>Phishing
        </button>
        <button class="chip" onclick="load('Hi Sarah, hope you are doing well! Just a reminder about our 3pm call tomorrow. I have shared the agenda doc in the calendar invite.')">
          <span class="chip-dot green"></span>Normal email
        </button>
        <button class="chip" onclick="load('Hey, are you free for lunch on Friday? There is a new place near the office I have been wanting to try.')">
          <span class="chip-dot green"></span>Casual message
        </button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="card-footer">
      <p class="footer-hint">Press <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to classify</p>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
        <button class="btn btn-primary" id="classify-btn" onclick="classify()">
          <span class="spin" id="spin"></span>
          <span id="btn-label">Classify</span>
        </button>
      </div>
    </div>
  </div>

  <div class="error-box" id="error-box">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;margin-top:1px">
      <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
      <path d="M8 5v3.5M8 10.5v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span id="error-text"></span>
  </div>

  <div class="card" id="result-card">
    <div class="result-header">
      <div class="verdict-wrap">
        <div class="verdict-icon" id="v-icon"></div>
        <div>
          <div class="verdict-label" id="v-label"></div>
          <div class="verdict-sub"  id="v-sub"></div>
        </div>
      </div>
      <div class="conf-badge" id="v-badge"></div>
    </div>
    <div class="prob-section">
      <p class="prob-label">Probability breakdown</p>
      <div class="bar-item">
        <div class="bar-meta">
          <span class="bar-name">Spam</span>
          <span class="bar-pct" id="spam-pct">—</span>
        </div>
        <div class="bar-track"><div class="bar-fill spam" id="spam-bar"></div></div>
      </div>
      <div class="bar-item">
        <div class="bar-meta">
          <span class="bar-name">Ham (not spam)</span>
          <span class="bar-pct" id="ham-pct">—</span>
        </div>
        <div class="bar-track"><div class="bar-fill ham" id="ham-bar"></div></div>
      </div>
    </div>
  </div>

  <div class="page-footer">
    MultinomialNB <span>·</span> TF-IDF 3k <span>·</span> /api/predict
  </div>

</div>
<script>
  function onInput() {
    const val = document.getElementById('input').value.trim();
    const w = val ? val.split(/\s+/).length : 0;
    document.getElementById('word-count').textContent = w + (w === 1 ? ' word' : ' words');
  }
  function load(text) {
    document.getElementById('input').value = text;
    onInput(); hide();
  }
  function clearAll() {
    document.getElementById('input').value = '';
    onInput(); hide();
  }
  function hide() {
    document.getElementById('error-box').className = 'error-box';
    const rc = document.getElementById('result-card');
    rc.classList.remove('show');
    rc.style.display = 'none';
  }
  function showResult() {
    const rc = document.getElementById('result-card');
    rc.style.display = 'block';
    requestAnimationFrame(() => requestAnimationFrame(() => rc.classList.add('show')));
  }
  async function classify() {
    const text = document.getElementById('input').value.trim();
    const btn = document.getElementById('classify-btn');
    const spin = document.getElementById('spin');
    const lbl = document.getElementById('btn-label');
    document.getElementById('error-box').className = 'error-box';
    hide();
    if (!text) {
      document.getElementById('error-text').textContent = 'Please enter a message to classify.';
      document.getElementById('error-box').className = 'error-box show';
      return;
    }
    btn.disabled = true; spin.style.display = 'block'; lbl.textContent = 'Analyzing…';
    try {
      const res = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      const data = await res.json();
      const isSpam = data.is_spam;
      const conf = data.confidence || {};
      let spamP = 0, hamP = 0;
      for (const [k, v] of Object.entries(conf)) {
        const key = String(k).toLowerCase();
        if (key === 'spam' || key === '1') spamP = v; else hamP = v;
      }
      const topConf = isSpam ? spamP : hamP;
      document.getElementById('v-icon').className   = 'verdict-icon ' + (isSpam ? 'spam' : 'ham');
      document.getElementById('v-icon').textContent = isSpam ? '🚨' : '✅';
      document.getElementById('v-label').className  = 'verdict-label ' + (isSpam ? 'spam' : 'ham');
      document.getElementById('v-label').textContent = isSpam ? 'Spam detected' : 'Looks legitimate';
      document.getElementById('v-sub').textContent   = isSpam
        ? 'This message shows signs of unsolicited content.'
        : 'This message appears to be a normal communication.';
      document.getElementById('v-badge').className   = 'conf-badge ' + (isSpam ? 'spam' : 'ham');
      document.getElementById('v-badge').textContent = (topConf * 100).toFixed(1) + '% confidence';
      document.getElementById('spam-pct').textContent = (spamP * 100).toFixed(1) + '%';
      document.getElementById('ham-pct').textContent  = (hamP  * 100).toFixed(1) + '%';
      showResult();
      setTimeout(() => {
        document.getElementById('spam-bar').style.width = (spamP * 100) + '%';
        document.getElementById('ham-bar').style.width  = (hamP  * 100) + '%';
      }, 80);
    } catch(e) {
      document.getElementById('error-text').textContent = e.message;
      document.getElementById('error-box').className = 'error-box show';
    } finally {
      btn.disabled = false; spin.style.display = 'none'; lbl.textContent = 'Classify';
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) classify(); });
</script>
</body>
</html>
